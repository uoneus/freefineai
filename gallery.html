    <!-- Particle Animation Script -->
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            var canvas = document.getElementById('particle-canvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var particles = [];
            var stars = [];
            var mouseX = 0, mouseY = 0;
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            function Particle() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15;
                this.opacity = Math.random() * 0.4 + 0.2;
            }
            
            Particle.prototype.update = function() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            };
            
            Particle.prototype.draw = function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(6, 182, 212, ' + this.opacity + ')';
                ctx.fill();
            };
            
            function Star(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 2;
                this.opacity = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            
            Star.prototype.update = function() {
                this.opacity -= this.decay;
            };
            
            Star.prototype.draw = function() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Date.now() * 0.005);
                ctx.beginPath();
                for (var i = 0; i < 5; i++) {
                    ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.size, -Math.sin((18 + i * 72) * Math.PI / 180) * this.size);
                    ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * this.size * 0.4, -Math.sin((54 + i * 72) * Math.PI / 180) * this.size * 0.4);
                }
                ctx.closePath();
                ctx.fillStyle = 'rgba(250, 204, 21, ' + this.opacity + ')';
                ctx.shadowColor = 'rgba(250, 204, 21, ' + this.opacity + ')';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.restore();
            };
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (var i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                for (var i = stars.length - 1; i >= 0; i--) {
                    stars[i].update();
                    stars[i].draw();
                    if (stars[i].opacity <= 0) {
                        stars.splice(i, 1);
                    }
                }
                requestAnimationFrame(animate);
            }
            
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (Math.random() > 0.5) {
                    stars.push(new Star(mouseX, mouseY));
                }
            });
            
            resize();
            window.addEventListener('resize', resize);
            for (var i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
            animate();
        });
    </script>
